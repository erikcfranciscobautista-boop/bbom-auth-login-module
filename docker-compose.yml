services:
  bbom-auth-login-module-localhost:
    build: 
      context: ./
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    # 👇 CORRECCIÓN 1: Cambiamos al script de desarrollo que sí existe
    command: npm run localhost
    # 👇 CORRECCIÓN 2: Montamos un volumen general para que 'test' y 'scripts' estén accesibles
    volumes:
      - .:/app
      - /app/node_modules
    develop:
      watch:
      - action: sync
        path: ./src
        target: /app/src
      - action: rebuild
        path: package.json

  bbom-auth-login-tests:
    build:
      context: ./
      dockerfile: Dockerfile
    # 👇 CORRECCIÓN 3: Cambiamos al comando aislado que quieres probar de inmediato
    command: npm run test:isolated
    volumes:
      - .:/app
      - /app/node_modules
    profiles:
      - test